name: orion-os

services:
  postgres:
    image: postgres:17-alpine
    profiles: ["phase-2"]
    environment:
      POSTGRES_DB: orion
      POSTGRES_USER: orion
      POSTGRES_PASSWORD: orion_local
    ports:
      - "5432:5432"
    volumes:
      - orion_postgres:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    profiles: ["phase-2"]
    ports:
      - "6379:6379"
    volumes:
      - orion_redis:/data

volumes:
  orion_postgres:
  orion_redis:
